name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python,javascript"

  secret-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check for common secret patterns
        run: |
          echo "Scanning for exposed secrets..."
          EXIT=0

          # Check for hardcoded API keys, tokens, passwords
          PATTERNS=(
            "sk-[a-zA-Z0-9]{20,}"
            "ghp_[a-zA-Z0-9]{36}"
            "AIza[a-zA-Z0-9\-_]{35}"
            "AKIA[0-9A-Z]{16}"
            "password\s*=\s*['\"][^'\"]{8,}['\"]"
            "api_key\s*=\s*['\"][a-zA-Z0-9]{20,}['\"]"
            "secret_key\s*=\s*['\"][a-zA-Z0-9]{20,}['\"]"
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -r --include="*.py" --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.env" -E "$pattern" --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=test-results --exclude-dir=playwright-report --exclude="*.test.*" --exclude="*.spec.*" . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "WARNING: Found potential secret match for pattern: $pattern"
              echo "$MATCHES" | head -20
              echo "---"
              EXIT=1
            fi
          done

          # Check that .gitignore exists and is reasonable
          if [ ! -f ".gitignore" ]; then
            echo "WARNING: No .gitignore file found"
            EXIT=1
          fi

          # Check that data/ directory is gitignored
          if grep -q "^/data/" .gitignore 2>/dev/null; then
            echo "OK: data/ directory is properly gitignored"
          else
            echo "WARNING: data/ directory may not be properly gitignored"
            EXIT=1
          fi

          # Check that config.json.example exists but config.json is ignored
          if [ -f "data/config.json.example" ]; then
            echo "OK: config.json.example exists"
          else
            echo "WARNING: No data/config.json.example found"
            EXIT=1
          fi

          exit $EXIT
